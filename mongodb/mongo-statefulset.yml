apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: mongodb
  replicas: 1

  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME_FILE
              value: /etc/mongo-credentials/MONGO_USER
            - name: MONGO_INITDB_ROOT_PASSWORD_FILE
              value: /etc/mongo-credentials/MONGO_PASSWORD
          volumeMounts:
            # Persistent Volume
            - name: mongodb-storage
              mountPath: /data/db

            # ConfigMap
            - name: mongodb-config
              mountPath: /config

            # Secret
            - name: mongo-secret-volume
              mountPath: /etc/mongo-credentials
              readOnly: true
      volumes:
        # ConfigMap volume
        - name: mongodb-config
          configMap:
            name: mongodb-config
        # Secret volume
        - name: mongo-secret-volume
          secret:
            secretName: mongodb-secret
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc
